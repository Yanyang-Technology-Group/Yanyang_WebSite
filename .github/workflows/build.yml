name: 构建文件

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 安装依赖
        run: npm ci
      
      - name: 构建 Vite + React 项目
        run: npm run build
      
      # 上传到 GitHub Actions Artifacts
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist  # 产物名称
          path: dist/  # 要上传的文件夹
          if-no-files-found: error  # 如果没找到文件就报错
          retention-days: 90  # 保留天数（可选，默认90天）
